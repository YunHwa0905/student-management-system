services:

  # PostgreSQL DB 컨테이너
  db:
    image: postgres:15
    container_name: score-db
    environment:
      POSTGRES_DB: scoredb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql  # 초기화 SQL
      - db-data:/var/lib/postgresql/data                      # 데이터 영속화
    ports:
      - "5432:5432"

  # Spring Legacy 백엔드 컨테이너
  backend:
    build: ./backend_logib
    container_name: score-backend
    ports:
      - "8080:8080"
    depends_on:
      - db  # db 먼저 실행 후 백엔드 실행
    environment:
      DB_URL: jdbc:postgresql://db:5432/scoredb
      DB_USER: admin
      DB_PASSWORD: admin1234

  # 프론트엔드 컨테이너
  frontend:
    build: ./frontend
    container_name: score-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:  # 볼륨 마운트로 데이터 영속화